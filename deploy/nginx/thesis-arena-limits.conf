# Loaded in nginx's http context through /etc/nginx/conf.d/*.conf.
limit_req_zone $binary_remote_addr zone=thesis_arena_per_ip:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=thesis_arena_retry:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=thesis_arena_status:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=thesis_arena_conn:10m;
