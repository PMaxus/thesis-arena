# Thesis Arena is isolated under one existing pmaxus.net path.
# This snippet is included inside the existing TLS server block.

location = /projects/thesis-arena {
    return 302 /projects/thesis-arena/;
}

location = /projects/thesis-arena/api/analyze {
    auth_basic "Thesis Arena Preview";
    auth_basic_user_file /etc/nginx/.htpasswd-thesis-arena;

    limit_req zone=thesis_arena_per_ip burst=1 nodelay;
    limit_req_status 429;
    limit_conn thesis_arena_conn 1;
    limit_conn_status 429;

    client_max_body_size 16k;
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:5678/webhook/thesis-arena-analyze;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Thesis-Arena-User $remote_user;
    proxy_set_header X-Thesis-Arena-Key __WEBHOOK_SECRET__;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header Cache-Control "no-store" always;
}

location = /projects/thesis-arena/api/status {
    auth_basic "Thesis Arena Preview";
    auth_basic_user_file /etc/nginx/.htpasswd-thesis-arena;

    limit_req zone=thesis_arena_status burst=4 nodelay;
    limit_req_status 429;
    limit_conn thesis_arena_conn 4;
    limit_conn_status 429;

    client_max_body_size 8k;
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:5678/webhook/thesis-arena-status;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Thesis-Arena-User $remote_user;
    proxy_set_header X-Thesis-Arena-Key __WEBHOOK_SECRET__;
    proxy_connect_timeout 10s;
    proxy_send_timeout 15s;
    proxy_read_timeout 20s;

    add_header Cache-Control "no-store" always;
}

location = /projects/thesis-arena/api/retry {
    auth_basic "Thesis Arena Preview";
    auth_basic_user_file /etc/nginx/.htpasswd-thesis-arena;

    limit_req zone=thesis_arena_retry burst=1 nodelay;
    limit_req_status 429;
    limit_conn thesis_arena_conn 1;
    limit_conn_status 429;

    client_max_body_size 8k;
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:5678/webhook/thesis-arena-retry;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Thesis-Arena-User $remote_user;
    proxy_set_header X-Thesis-Arena-Key __WEBHOOK_SECRET__;
    proxy_connect_timeout 10s;
    proxy_send_timeout 15s;
    proxy_read_timeout 20s;

    add_header Cache-Control "no-store" always;
}

location ^~ /projects/thesis-arena/ {
    auth_basic "Thesis Arena Preview";
    auth_basic_user_file /etc/nginx/.htpasswd-thesis-arena;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ =404;
}
